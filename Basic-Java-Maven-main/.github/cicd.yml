name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        server-id: github
        
    - name: Build and Test (Continuous Integration)
      run: mvn clean test

    - name: Publish to GitHub Packages (Continuous Deployment)
      run: mvn deploy
      env:
        GITHUB_TOKEN: ${{ secrets.MAVEN_TOKEN }}